name: Feature request
description: Suggest a focused improvement for dflasher.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow or limitation should this improve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the behavior, command, or API you would like.
    validations:
      required: true
  - type: dropdown
    id: backend
    attributes:
      label: Backend
      options:
        - Local DFlash-lite
        - Official CUDA/vLLM/Speculators
        - Mac MPS
        - z-lab MLX
        - Documentation
        - Other
    validations:
      required: true
